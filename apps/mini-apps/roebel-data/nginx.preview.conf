server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # This preview is a compiled, synthetic read model. It must not open a
    # browser connection to an API, wallet, analytics provider or identity
    # service even if a future static asset is accidentally changed. The
    # explicit static-bundle verifier enforces the matching build invariant.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; form-action 'none'; connect-src 'none'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; object-src 'none'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;

    # No server-side API/image proxy exists in the static preview. The public
    # HAProxy boundary independently rejects non-read methods before traffic
    # reaches this Pod.
    location ^~ /api/ { return 404; }
    location = /_next/image { return 404; }

    location / {
        # Static-file serving has no useful OPTIONS implementation by default.
        # Explicitly complete the browser's read-only CORS/preflight path while
        # leaving mutation rejection to the ingress boundary.
        if ($request_method = OPTIONS) {
            add_header Allow "GET, HEAD, OPTIONS" always;
            return 204;
        }
        try_files $uri $uri/ $uri.html /index.html;
    }
}
