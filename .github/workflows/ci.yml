name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Web unit tests
        run: pnpm test:web

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        env:
          # Next imports external-service route modules while collecting page
          # data. These non-secret placeholders only validate that the build
          # can be produced; CI does not publish or deploy its output.
          NEXT_PUBLIC_SUPABASE_URL: https://ci.invalid
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-placeholder
          STRIPE_SECRET_KEY: sk_test_ci-build-placeholder
        run: pnpm build
